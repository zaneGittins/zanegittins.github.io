<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- Rounded off-white background -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#F8F6F0"/>

  <!-- Snowflake / asterisk logo -->
  <g stroke="#836BFF" stroke-width="4.5" stroke-linecap="round">
    <line x1="32" y1="14" x2="32" y2="50"/>
    <line x1="18" y1="20" x2="46" y2="44"/>
    <line x1="46" y1="20" x2="18" y2="44"/>
  </g>

  <!-- Small accent strokes -->
  <g stroke="#836BFF" stroke-width="3" stroke-linecap="round" opacity="0.55">
    <line x1="14" y1="10" x2="9" y2="16"/>
    <line x1="55" y1="48" x2="49" y2="55"/>
  </g>

</svg>
